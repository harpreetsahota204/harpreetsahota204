<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#191C1F"/>
      <stop offset="50%" stop-color="#212529"/>
      <stop offset="100%" stop-color="#191C1F"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#212529"/>
      <stop offset="20%" stop-color="#FF6D04"/>
      <stop offset="80%" stop-color="#FF6D04"/>
      <stop offset="100%" stop-color="#212529"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes float1 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
    @keyframes float2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(5px); } }
    @keyframes float3 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }
    .sq1 { animation: float1 4s ease-in-out infinite; }
    .sq2 { animation: float2 5s ease-in-out infinite; }
    .sq3 { animation: float3 3.5s ease-in-out infinite; }
    .glow { animation: pulse 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Accent line at bottom -->
  <rect x="0" y="196" width="1200" height="4" fill="url(#accent-line)"/>

  <!-- Floating voxel squares (brand colors) -->
  <g class="sq1"><rect x="80" y="40" width="10" height="10" rx="2" fill="#FF6D04" opacity="0.7"/></g>
  <g class="sq2"><rect x="180" y="130" width="7" height="7" rx="1" fill="#499CEF" opacity="0.5"/></g>
  <g class="sq3"><rect x="320" y="55" width="8" height="8" rx="2" fill="#B681FF" opacity="0.6"/></g>
  <g class="sq1"><rect x="440" y="150" width="6" height="6" rx="1" fill="#59A65C" opacity="0.5"/></g>
  <g class="sq2"><rect x="550" y="35" width="9" height="9" rx="2" fill="#FFEB52" opacity="0.5"/></g>
  <g class="sq3"><rect x="720" y="145" width="8" height="8" rx="2" fill="#FFB682" opacity="0.5"/></g>
  <g class="sq1"><rect x="850" y="50" width="7" height="7" rx="1" fill="#DABFFF" opacity="0.6"/></g>
  <g class="sq2"><rect x="950" y="130" width="10" height="10" rx="2" fill="#ACD2AD" opacity="0.5"/></g>
  <g class="sq3"><rect x="1050" y="60" width="6" height="6" rx="1" fill="#FF6D04" opacity="0.6"/></g>
  <g class="sq1"><rect x="1100" y="140" width="8" height="8" rx="2" fill="#499CEF" opacity="0.5"/></g>
  <g class="sq2"><rect x="250" y="100" width="5" height="5" rx="1" fill="#A4CDF7" opacity="0.4"/></g>
  <g class="sq3"><rect x="650" y="70" width="6" height="6" rx="1" fill="#FFF5A8" opacity="0.4"/></g>
  <g class="sq1"><rect x="790" y="95" width="5" height="5" rx="1" fill="#B681FF" opacity="0.4"/></g>

  <!-- Title text -->
  <text x="600" y="82" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#E8E9E9">Harpreet Sahota</text>

  <!-- Subtitle -->
  <text x="600" y="118" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="16" fill="#A6A7A9">Hacker-in-Residence</text>

  <!-- "at" with brand styling -->
  <text x="600" y="145" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" font-size="16">
    <tspan fill="#A6A7A9">at </tspan>
    <tspan fill="#A6A7A9" font-weight="600">Voxel</tspan><tspan fill="#FF6D04" font-weight="600">51</tspan>
  </text>

  <!-- Subtle corner accents -->
  <line x1="40" y1="30" x2="40" y2="55" stroke="#FF6D04" stroke-width="2" opacity="0.3"/>
  <line x1="40" y1="30" x2="65" y2="30" stroke="#FF6D04" stroke-width="2" opacity="0.3"/>
  <line x1="1160" y1="170" x2="1160" y2="145" stroke="#FF6D04" stroke-width="2" opacity="0.3"/>
  <line x1="1160" y1="170" x2="1135" y2="170" stroke="#FF6D04" stroke-width="2" opacity="0.3"/>
</svg>
